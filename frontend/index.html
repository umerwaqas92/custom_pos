<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1220" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="alternate icon" type="image/png" href="/favicon.png" />
    <title>Electronics Shop Management System</title>
    <script>
      (function() {
        var theme = localStorage.getItem("pos_theme") || "dark";
        document.documentElement.classList.add(theme);
      })();
    </script>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root">
      <div id="boot-loader" style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;font-family:system-ui,sans-serif;background:#0b1220;color:#e5e7eb">
        <div style="width:36px;height:36px;border:3px solid #334155;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite"></div>
        <div style="font-size:14px;font-weight:600">Loading POS…</div>
        <div style="font-size:12px;color:#94a3b8;max-width:280px;text-align:center">First load can take 10–30s on free hosting. If this never finishes, clear site data and retry.</div>
        <button type="button" onclick="try{localStorage.clear();sessionStorage.clear();}catch(e){}location.href=location.pathname+'?nocache='+Date.now();" style="margin-top:8px;padding:8px 14px;border-radius:10px;border:1px solid #334155;background:#1e293b;color:#e5e7eb;cursor:pointer;font-size:12px">Clear cache & reload</button>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
